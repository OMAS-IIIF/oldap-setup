# site.yml
- hosts: oldap
  become: yes

  # If you have group defaults, you can create group_vars/all.yml later.
  # Keep this line commented out for now so the playbook runs standalone.
  # vars_files:
  #   - group_vars/all.yml

  # Reset mode for the compose stack:
  # - none (default): just `docker compose up -d`
  # - soft: `docker compose down --remove-orphans` then up again (keeps volumes)
  # - hard: `docker compose down -v --remove-orphans` then up again (removes volumes!)
  vars:
    oldap_reset: "{{ oldap_reset | default('none') }}"

    # Defaults (override via inventory/group_vars or -e)
    docker_packages:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin

    docker_data_root: "/var/lib/docker"
    compose_stack_dir: "/opt/oldap/compose"

  pre_tasks:
    - name: Ensure base packages
      apt:
        name:
          - ca-certificates
          - curl
          - gnupg
          - lvm2
        state: present
        update_cache: yes

  tasks:
    - name: Ensure mountpoint exists
      file:
        path: /srv/storage
        state: directory
        mode: "0755"

    - name: Mount /srv/storage by UUID and persist in fstab
      when: storage_uuid is defined and (storage_uuid | string | length) > 0
      mount:
        path: /srv/storage
        src: "UUID={{ storage_uuid }}"
        fstype: ext4
        opts: defaults
        state: mounted

    # --- Docker repo (keyrings) ---
    - name: Ensure /etc/apt/keyrings exists
      file:
        path: /etc/apt/keyrings
        state: directory
        mode: '0755'

    - name: Download Docker GPG key (keyrings)
      get_url:
        url: https://download.docker.com/linux/ubuntu/gpg
        dest: /etc/apt/keyrings/docker.asc
        mode: '0644'

    - name: Convert Docker GPG key to keyring format (dearmor)
      command: "gpg --dearmor -o /etc/apt/keyrings/docker.gpg /etc/apt/keyrings/docker.asc"
      args:
        creates: /etc/apt/keyrings/docker.gpg

    - name: Ensure correct permissions on Docker keyring
      file:
        path: /etc/apt/keyrings/docker.gpg
        mode: '0644'

    - name: Remove legacy Docker apt source definitions (avoid Signed-By conflicts)
      file:
        path: "{{ item }}"
        state: absent
      loop:
        - /etc/apt/sources.list.d/docker.list
        - /etc/apt/sources.list.d/download_docker_com_linux_ubuntu.list

    - name: Add Docker apt repository (keyrings)
      apt_repository:
        repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu {{ ansible_lsb.codename }} stable"
        state: present
        filename: docker
      register: docker_repo

    - name: Update apt cache if repo changed
      apt:
        update_cache: yes
      when: docker_repo is changed

    - name: Install Docker packages
      apt:
        name: "{{ docker_packages }}"
        state: present

    - name: Ensure docker group for current admin (optional)
      user:
        name: "{{ ansible_user | default(ansible_user_id) }}"
        groups: docker
        append: yes

    - name: Create Docker data root
      file:
        path: "{{ docker_data_root }}"
        state: directory
        mode: "0750"

    - name: Write /etc/docker/daemon.json
      copy:
        dest: /etc/docker/daemon.json
        mode: "0644"
        content: |
          {
            "data-root": "{{ docker_data_root }}",
            "log-driver": "json-file",
            "log-opts": {
              "max-size": "10m",
              "max-file": "5"
            },
            "exec-opts": ["native.cgroupdriver=systemd"],
            "default-address-pools": [
              {"base":"10.88.0.0/16","size":24}
            ],
            "live-restore": true
          }
      notify: Restart docker

    - name: Optional migration – copy existing /var/lib/docker if present and non-empty
      block:
        - name: Check if /var/lib/docker exists and non-empty
          stat:
            path: /var/lib/docker
          register: docker_old

        - name: Rsync old docker data into new data-root (first run only)
          command: >
            rsync -aHAX --delete --numeric-ids /var/lib/docker/ {{ docker_data_root }}/
          when: docker_old.stat.exists and docker_old.stat.isdir
      when: docker_data_root != "/var/lib/docker"

    - name: Enable and start docker
      systemd:
        name: docker
        enabled: yes
        state: started

    - name: Create compose stack directory
      file:
        path: "{{ compose_stack_dir }}"
        state: directory
        mode: "0755"

    - name: Deploy real docker-compose.yml
      copy:
        src: ../docker-compose.yml
        dest: "{{ compose_stack_dir }}/docker-compose.yml"
        mode: "0644"

    - name: Deploy configured Caddyfile from template
      template:
        src: Caddyfile.j2
        dest: "{{ compose_stack_dir }}/Caddyfile"
        mode: "0644"

    - name: Reset stack (soft/hard) if requested
      block:
        - name: Soft reset (stop + remove containers, keep volumes)
          command: docker compose down --remove-orphans
          args:
            chdir: "{{ compose_stack_dir }}"
          register: down_result
          changed_when: true
          when: oldap_reset == 'soft'

        - name: Hard reset (stop + remove containers AND volumes!)
          command: docker compose down -v --remove-orphans
          args:
            chdir: "{{ compose_stack_dir }}"
          register: downv_result
          changed_when: true
          when: oldap_reset == 'hard'
      when: oldap_reset in ['soft', 'hard']

    - name: Bring stack up (pull images, create/update containers)
      command: docker compose up -d --remove-orphans
      args:
        chdir: "{{ compose_stack_dir }}"
      register: up_result
      changed_when: "'Creating' in up_result.stdout or 'Recreating' in up_result.stdout or 'Starting' in up_result.stdout"
      failed_when: up_result.rc not in [0]

  handlers:
    - name: Restart docker
      systemd:
        name: docker
        state: restarted